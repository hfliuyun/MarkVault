name: Deploy Content to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Content to DMIT VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "Syncing MarkVault Content..."
            
            # 假设内容库克隆在 ~/MarkVault/content 下
            # 如果你的路径不同，请在此处修改
            cd ~/MarkVault/content
            git pull origin main || git pull origin master
            
            # 重启后端服务，触发重建文章索引
            sudo systemctl restart markvault-backend
            echo "Content synced and backend restarted to index new articles."
